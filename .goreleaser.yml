version: 2

project_name: noisecat

before:
  hooks:
    - go mod tidy

builds:
  - id: noisecat
    main: ./cmd/noisecat
    binary: noisecat
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
    # No ignore list: noisecat is a pure-Go CLI with CGO disabled, so
    # the cross-compile works for every {os, arch} combination above —
    # including windows/arm64 and freebsd/arm64 (Pi-class servers).
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: noisecat
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Generate a CycloneDX SBOM for every release archive (via syft, installed
# in the release workflow). Published alongside the archives so downstream
# users can audit the dependency tree of each binary.
sboms:
  - id: archive
    artifacts: archive

# Sign the checksums file with cosign in keyless mode. GitHub Actions OIDC
# (id-token: write) supplies the short-lived identity, so there are no keys
# to manage. The .sig + .pem land next to checksums.txt; verify with:
#   cosign verify-blob --certificate checksums.txt.pem \
#     --signature checksums.txt.sig \
#     --certificate-identity-regexp 'https://github.com/gedigi/noisecat/.+' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
