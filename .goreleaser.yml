version: 2

project_name: noisecat

before:
  hooks:
    - go mod tidy

builds:
  - id: noisecat
    main: ./cmd/noisecat
    binary: noisecat
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
    # No ignore list: noisecat is a pure-Go CLI with CGO disabled, so
    # the cross-compile works for every {os, arch} combination above —
    # including windows/arm64 and freebsd/arm64 (Pi-class servers).
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: noisecat
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
